<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا أفنان! 🎮🎉</title>
    <style>
        /* جميع التنسيقات (CSS) المدمجة من الكودين */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; overflow-x: hidden; color: #333;
        }

        /* تنسيق الألعاب والعناصر المتحركة */
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .floating-item { position: absolute; font-size: 2em; opacity: 0.1; animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-100vh) rotate(360deg); } }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 1; }
        .hero-content { background: rgba(255,255,255,0.95); padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 90%; }
        
        .start-btn { background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 15px 40px; font-size: 1.2em; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .start-btn:hover { transform: scale(1.05); }

        .games-menu, .game-area, .final-section { display: none; padding: 40px 20px; position: relative; z-index: 1; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 30px; padding: 30px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background: #764ba2; color: white; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card.completed { background: #38ef7d; }

        /* منطقة الألعاب الخاصة */
        .tennis-game, .skate-game, .fish-game, .bug-game { position: relative; height: 400px; border-radius: 20px; overflow: hidden; background: #eee; }
        .tennis-ball { position: absolute; width: 25px; height: 25px; background: yellow; border-radius: 50%; }
        .tennis-racket { position: absolute; bottom: 10px; width: 80px; height: 15px; background: #333; border-radius: 10px; }
        .diff-image { width: 250px; height: 250px; display: inline-block; position: relative; border: 2px solid #ccc; margin: 10px; }
        .diff-spot { position: absolute; width: 30px; height: 30px; border: 2px solid red; border-radius: 50%; display: none; }
        .crossword-grid { display: grid; grid-template-columns: repeat(9, 35px); gap: 2px; justify-content: center; }
        .cross-cell { width: 35px; height: 35px; border: 1px solid #764ba2; }
        .cross-cell input { width: 100%; height: 100%; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-animation" id="bgAnimation"></div>

    <section class="hero active" id="home">
        <div class="hero-content">
            <h1>عيد ميلاد سعيد يا أفنان! 🎈</h1>
            <p>عبدالله جهز لكِ 25 لعبة ممتعة للاحتفال بيومك المميز!</p>
            <button class="start-btn" onclick="startGames()">ابدئي الرحلة 🚀</button>
        </div>
    </section>

    <section class="games-menu" id="gamesMenu">
        <div class="container">
            <h2 style="text-align:center; margin-bottom:20px;">اختاري تحدياً يا بطلة! (تم إنجاز <span id="completedCount">0</span>/25)</h2>
            <div class="games-grid" id="gamesGrid"></div>
        </div>
    </section>

    <section class="game-area" id="gameArea">
        <div class="container" id="gameContainer">
            <div class="game-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <button onclick="backToMenu()" style="padding:10px; cursor:pointer;">⬅️ عودة</button>
                <div id="scoreBox">النقاط: <span id="currentScore">0</span></div>
            </div>
            <div id="gameContent"></div>
        </div>
    </section>

    <section class="final-section" id="finalSection">
        <div class="hero-content" style="margin: auto;">
            <h2>مبارك يا أفنان! 🎉</h2>
            <p>لقد أنهيتِ جميع الألعاب. كل عام وأنتِ بخير!</p>
            <button class="start-btn" onclick="location.reload()">إعادة اللعب 🔄</button>
        </div>
    </section>

    <script>
        // دمج بيانات الألعاب من الكودين
        const games = [
            { id: 1, name: "اضرب الحشرة", icon: "🐛" },
            { id: 2, name: "سرعة الكتابة", icon: "⌨️" },
            { id: 3, name: "ترتيب الأرقام", icon: "🔢" },
            { id: 4, name: "حجر ورقة مقص", icon: "✊" },
            { id: 5, name: "تخمين اللون", icon: "🎨" },
            { id: 6, name: "ذاكرة الصور", icon: "🧠" },
            { id: 7, name: "رياضيات سريعة", icon: "➕" },
            { id: 8, name: "لعبة التعليق", icon: "📝" },
            { id: 9, name: "سرعة النقر", icon: "👆" },
            { id: 10, name: "التطابق", icon: "🎯" },
            { id: 11, name: "الكرات المتحركة", icon: "🔴" },
            { id: 12, name: "سباق السفن", icon: "🚢" },
            { id: 13, name: "صيد السمك", icon: "🐟" },
            { id: 14, name: "التنس", icon: "🎾" },
            { id: 15, name: "الاختلافات", icon: "🔍" },
            { id: 16, name: "كلمات متقاطعة", icon: "🧩" },
            { id: 17, name: "ترتيب الأشكال", icon: "🔷" },
            { id: 18, name: "البحث عن الكنز", icon: "💎" },
            { id: 19, name: "فرقعة البالونات", icon: "🎈" },
            { id: 20, name: "بيانو أفنان", icon: "🎹" },
            { id: 21, name: "لعبة السلايم", icon: "🟢" },
            { id: 22, name: "التزلج", icon: "🛹" },
            { id: 23, name: "الطبخ السريع", icon: "👨‍🍳" },
            { id: 24, name: "الرسم الحر", icon: "🎨" },
            { id: 25, name: "الغاز المنطق", icon: "🧩" }
        ];

        let completedGames = new Set();
        let currentGameId = null;

        function startGames() {
            document.getElementById('home').classList.remove('active');
            document.getElementById('gamesMenu').classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = `game-card ${completedGames.has(game.id) ? 'completed' : ''}`;
                card.innerHTML = `<h3>${game.icon}</h3><p>${game.name}</p>`;
                card.onclick = () => loadGame(game.id);
                grid.appendChild(card);
            });
            document.getElementById('completedCount').textContent = completedGames.size;
            if(completedGames.size === 25) showFinal();
        }

        function loadGame(id) {
            currentGameId = id;
            document.getElementById('gamesMenu').classList.remove('active');
            document.getElementById('gameArea').classList.add('active');
            document.getElementById('currentScore').textContent = '0';
            
            // استدعاء دالة تشغيل اللعبة بناءً على ID
            const content = document.getElementById('gameContent');
            content.innerHTML = ''; // تنظيف المنطقة
            
            // اختيار اللعبة (تم دمج المنطق هنا)
            if(id === 14) initTennisGame();
            else if(id === 15) initDifferencesGame();
            else if(id === 16) initCrosswordGame();
            else if(id === 19) initBalloonsGame();
            else if(id === 24) initDrawingGame();
            else {
                content.innerHTML = `<h3>لعبة ${id} قيد التطوير أو بسيطة</h3><button onclick="completeGame(100)">تخطي للفوز</button>`;
            }
        }

        function completeGame(score) {
            completedGames.add(currentGameId);
            alert(`أحسنتِ! حصلتِ على ${score} نقطة`);
            backToMenu();
        }

        function backToMenu() {
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('gamesMenu').classList.add('active');
            renderMenu();
        }

        function showFinal() {
            document.getElementById('gamesMenu').classList.remove('active');
            document.getElementById('finalSection').classList.add('active');
        }

        // --- منطق الألعاب المدمج ---

        // 14. التنس
        function initTennisGame() {
            const area = document.getElementById('gameContent');
            area.innerHTML = `<div class="tennis-game" id="tArea"><div class="tennis-ball" id="tBall"></div><div class="tennis-racket" id="tRacket"></div></div>`;
            const ball = document.getElementById('tBall');
            const racket = document.getElementById('tRacket');
            let bx = 50, by = 50, dx = 3, dy = 3;
            
            document.getElementById('tArea').onmousemove = (e) => {
                let rect = document.getElementById('tArea').getBoundingClientRect();
                let x = e.clientX - rect.left - 40;
                racket.style.left = Math.max(0, Math.min(rect.width-80, x)) + 'px';
            };

            let gameInt = setInterval(() => {
                bx += dx; by += dy;
                if(bx <= 0 || bx >= 90) dx = -dx;
                if(by <= 0) dy = -dy;
                if(by >= 350) {
                    let rx = parseFloat(racket.style.left) || 0;
                    if(bx*4 >= rx/2 && bx*4 <= (rx+80)/2) dy = -dy;
                    else { clearInterval(gameInt); completeGame(50); }
                }
                ball.style.left = bx + '%'; ball.style.top = by + 'px';
            }, 20);
        }

        // 19. البالونات
        function initBalloonsGame() {
            const area = document.getElementById('gameContent');
            area.innerHTML = `<div class="skate-game" id="bArea" style="background:skyblue"></div><p>فرقعي 5 بالونات!</p>`;
            let count = 0;
            let intv = setInterval(() => {
                const b = document.createElement('div');
                b.innerHTML = '🎈'; b.style.position = 'absolute';
                b.style.left = Math.random()*90+'%'; b.style.bottom = '0';
                b.style.fontSize = '2em'; b.style.cursor = 'pointer';
                b.onclick = () => { b.remove(); count++; if(count>=5){ clearInterval(intv); completeGame(100); } };
                document.getElementById('bArea').appendChild(b);
                let pos = 0;
                let m = setInterval(() => { pos += 2; b.style.bottom = pos + 'px'; if(pos>400){ clearInterval(m); b.remove(); }}, 20);
            }, 1000);
        }

        // (يمكنك إضافة باقي وظائف الألعاب بنفس الطريقة هنا)

        // تهيئة الخلفية
        (function() {
            const bg = document.getElementById('bgAnimation');
            for(let i=0; i<15; i++) {
                let div = document.createElement('div');
                div.className = 'floating-item';
                div.textContent = '🎂';
                div.style.left = Math.random()*100+'%';
                div.style.animationDelay = Math.random()*10+'s';
                bg.appendChild(div);
            }
        })();
    </script>
</body>
</html>
