<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محادثة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #0f0f0f 0%, #1a1a1a 100%);
      z-index: -1;
    }

    .header {
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: fixed;
      top: 0; width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
    }

    .back { font-size: 1.4em; cursor: pointer; }
    
    .user {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(45deg, #fe2c55, #25f4ee);
      padding: 2px;
      position: relative;
    }
    
    .avatar div {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
    }

    .online {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 12px; height: 12px;
      background: #00d084;
      border: 2px solid black;
      border-radius: 50%;
      box-shadow: 0 0 10px #00d084;
    }

    .info h4 { font-size: 1em; margin-bottom: 2px; }
    .info p {
      font-size: 0.75em;
      color: rgba(255,255,255,0.6);
      transition: all 0.3s;
    }
    
    .info p.typing {
      color: #25f4ee;
      font-weight: 600;
    }

    .chat {
      height: calc(100vh - 130px);
      margin-top: 70px;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .date {
      text-align: center;
      margin: 20px 0;
      font-size: 0.75em;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
      padding: 6px 16px;
      border-radius: 20px;
      width: fit-content;
      align-self: center;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.received { align-self: flex-start; }

    .mini-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(45deg, #fe2c55, #25f4ee);
      padding: 1.5px;
    }
    
    .mini-av div {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8em;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95em;
      line-height: 1.5;
      position: relative;
    }

    .sent .bubble {
      background: #fe2c55;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(254,44,85,0.3);
    }

    .received .bubble {
      background: rgba(255,255,255,0.08);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .bubble.love {
      background: linear-gradient(135deg, #fe2c55, #ff0050);
      font-size: 1.15em;
      font-weight: 700;
      padding: 16px 20px;
      animation: heartbeat 2s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .time {
      font-size: 0.7em;
      opacity: 0.8;
      margin-top: 4px;
      display: block;
      text-align: left;
    }

    .typing-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      align-self: flex-start;
    }
    
    .typing-row.show { display: flex; }

    .typing-bubble {
      background: rgba(255,255,255,0.08);
      padding: 16px 20px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 8px; height: 8px;
      background: #25f4ee;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    
    .dot:nth-child(1) { animation-delay: -0.32s; background: #fe2c55; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .dot:nth-child(3) { animation-delay: 0; background: #fe2c55; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(15,15,15,0.98);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s;
    }
    
    .input-bar.hide { transform: translateY(100%); }

    .input-box {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 0.95em;
      outline: none;
    }
    
    .input-box input::placeholder { color: rgba(255,255,255,0.4); }

    .send-btn {
      width: 44px; height: 44px;
      background: #fe2c55;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.2em;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(254,44,85,0.4);
    }

    .options {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.98);
      padding: 20px 16px 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 200;
      animation: slideUp 0.4s;
    }
    
    .options.show { display: flex; }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .opt-title {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 0.85em;
      margin-bottom: 10px;
    }

    .opt-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      padding: 16px 20px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s;
    }

    .opt-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateX(-5px);
    }

    .opt-btn.love {
      background: linear-gradient(135deg, rgba(254,44,85,0.2), rgba(254,44,85,0.1));
      border-color: #fe2c55;
    }

    .final {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      animation: fadeIn 0.5s;
    }
    
    .final.active { display: flex; }

    .final-icon { font-size: 5em; margin-bottom: 20px; animation: float 3s infinite; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .final h2 {
      font-size: 1.8em;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #fe2c55, #25f4ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .final p {
      color: rgba(255,255,255,0.8);
      font-size: 1.1em;
      line-height: 1.8;
      max-width: 350px;
      margin-bottom: 30px;
    }
    
    .retry-btn {
      padding: 15px 40px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 30px;
      font-family: inherit;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="header">
    <div class="back">←</div>
    <div class="user">
      <div class="avatar"><div>👤</div><div class="online"></div></div>
      <div class="info">
        <h4>أنتِ</h4>
        <p id="status">متصل الآن</p>
      </div>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="date" id="today">اليوم</div>
    
    <div class="typing-row" id="typing">
      <div class="mini-av"><div>👤</div></div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="input-bar" id="inputBar">
    <div class="input-box">
      <span>😊</span>
      <input type="text" placeholder="اكتبي رسالة..." readonly>
      <span>📎</span>
    </div>
    <button class="send-btn">➤</button>
  </div>

  <div class="options" id="options">
    <div class="opt-title">اختاري ردكِ:</div>
    <button class="opt-btn love" onclick="reply('love')">
      <span>❤️</span>
      <span>أنا كمان نفس الشي</span>
    </button>
    <button class="opt-btn" onclick="reply('think')">
      <span>🤔</span>
      <span>بدي وقت أفكر</span>
    </button>
    <button class="opt-btn" onclick="reply('friend')">
      <span>💙</span>
      <span>خلنظل أصحاب</span>
    </button>
  </div>

  <div class="final" id="end-love">
    <div class="final-icon">💑</div>
    <h2>مبروك علينا!</h2>
    <p>بعد 8 شهور من الحديث... طلع الإحساس متبادل. هلق صرنا مع بعض ❤️</p>
    <button class="retry-btn" onclick="location.reload()">إعادة المحادثة</button>
  </div>

  <div class="final" id="end-think">
    <div class="final-icon">🌙</div>
    <h2>ماشي حبيبتي</h2>
    <p>القرار الكبير بده وقت. أنا رح أنتظر، ما في عندي مشكل. خدي راحتكِ 💭</p>
    <button class="retry-btn" onclick="location.reload()">إعادة المحادثة</button>
  </div>

  <div class="final" id="end-friend">
    <div class="final-icon">🤝</div>
    <h2>الصداقة أغلى</h2>
    <p>الشهور اللي فاتت كانت حلوة كصداقة، ورح تبقى حلوة. شكراً إلكِ 💙</p>
    <button class="retry-btn" onclick="location.reload()">إعادة المحادثة</button>
  </div>

  <script>
    // التاريخ اليوم
    document.getElementById('today').textContent = new Date().toLocaleDateString('ar-SA');

    // الرسائل باللهجة الفلسطينية
    const msgs = [
      { text: "شو بدي أقلكِ، صاروا 8 شهور وإحنا منحكي يومياً 📱", delay: 800 },
      { text: "من يوليو الماضي وأنا بعرفكِ من ورا الحروف بس", delay: 2500 },
      { text: "ما شفتكِ ولا سمعت صوتكِ، بس حاسس إني بعرفكِ أكتر من كتير ناس", delay: 4500 },
      { text: "بعرف لما تكوني زعلانة من طول الصمت 😔", delay: 6500 },
      { text: "وبعرف لما تفرحي من سرعة ردكِ وهيك 😊", delay: 8500 },
      { text: "هاد الإحساس كبر مع الوقت...", delay: 10500 },
      { text: "وصل لمرحلة إنكِ صرتي جزء من يومي، ما بنقدر نستغني عنه", delay: 12500 },
      { text: "واللهي ما بوعدكِ بلقاء قريب، ولا بصور ولا مكالمات 📵", delay: 15000 },
      { text: "بس بدي أكون صريح معكِ...", delay: 17500 },
      { text: "أنا بحبكِ ❤️", delay: 20000, love: true },
      { text: "رغم هاد الغياب، أو يمكن من وراه ✨", delay: 24000 },
      { text: "بحبكِ لأن روحكِ وصلتني من ورا الشاشة 💫", delay: 27000 }
    ];

    let i = 0;
    const chat = document.getElementById('chat');
    const typing = document.getElementById('typing');
    const status = document.getElementById('status');

    function showTyping() {
      typing.classList.add('show');
      status.textContent = "يكتب الآن...";
      status.classList.add('typing');
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      typing.classList.remove('show');
      status.textContent = "متصل الآن";
      status.classList.remove('typing');
    }

    function addMsg(text, isLove = false) {
      const row = document.createElement('div');
      row.className = 'msg-row sent';
      
      const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
      
      row.innerHTML = `
        <div class="bubble ${isLove ? 'love' : ''}">
          ${text}
          <span class="time">${time} ✓✓</span>
        </div>
      `;
      
      chat.insertBefore(row, typing);
      chat.scrollTop = chat.scrollHeight;
    }

    function play() {
      if (i < msgs.length) {
        showTyping();
        setTimeout(() => {
          hideTyping();
          addMsg(msgs[i].text, msgs[i].love);
          i++;
          if (i < msgs.length) setTimeout(play, 700);
          else setTimeout(showOpts, 2000);
        }, 2000);
      }
    }

    function showOpts() {
      document.getElementById('inputBar').classList.add('hide');
      document.getElementById('options').classList.add('show');
      status.textContent = "في انتظار ردكِ...";
      status.style.color = "#fe2c55";
    }

    function reply(type) {
      const texts = {
        love: "أنا كمان نفس الشي ❤️",
        think: "بدي وقت أفكر 🤔",
        friend: "خلنظل أصحاب 💙"
      };
      
      // إضافة ردها
      const row = document.createElement('div');
      row.className = 'msg-row received';
      row.style.animation = 'pop 0.4s 0.2s both';
      const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
      
      row.innerHTML = `
        <div class="mini-av"><div>👤</div></div>
        <div class="bubble">${texts[type]}<span class="time">${time}</span></div>
      `;
      
      chat.insertBefore(row, typing);
      chat.scrollTop = chat.scrollHeight;
      
      document.getElementById('options').classList.remove('show');
      
      setTimeout(() => {
        document.getElementById('end-'+type).classList.add('active');
      }, 1000);
    }

    setTimeout(play, 500);
  </script>
</body>
</html>
