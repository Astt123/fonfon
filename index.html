<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محادثة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #0f0f0f 0%, #1a1a1a 100%);
      z-index: -1;
    }

    .header {
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: fixed;
      top: 0; width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
    }

    .back { font-size: 1.4em; cursor: pointer; }
    
    .user {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(45deg, #fe2c55, #25f4ee);
      padding: 2px;
      position: relative;
    }
    
    .avatar div {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
    }

    .online {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 12px; height: 12px;
      background: #00d084;
      border: 2px solid black;
      border-radius: 50%;
      box-shadow: 0 0 10px #00d084;
    }

    .info h4 { font-size: 1em; margin-bottom: 2px; }
    .info p {
      font-size: 0.75em;
      color: rgba(255,255,255,0.6);
      transition: all 0.3s;
    }
    
    .info p.typing {
      color: #25f4ee;
      font-weight: 600;
    }

    .chat {
      height: calc(100vh - 130px);
      margin-top: 70px;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .date {
      text-align: center;
      margin: 20px 0;
      font-size: 0.75em;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
      padding: 6px 16px;
      border-radius: 20px;
      width: fit-content;
      align-self: center;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.received { align-self: flex-start; }

    .mini-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(45deg, #fe2c55, #25f4ee);
      padding: 1.5px;
    }
    
    .mini-av div {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8em;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95em;
      line-height: 1.5;
      position: relative;
    }

    .sent .bubble {
      background: #fe2c55;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(254,44,85,0.3);
    }

    .received .bubble {
      background: rgba(255,255,255,0.08);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .bubble.love {
      background: linear-gradient(135deg, #fe2c55, #ff0050);
      font-size: 1.15em;
      font-weight: 700;
      padding: 16px 20px;
      animation: heartbeat 2s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .time {
      font-size: 0.7em;
      opacity: 0.8;
      margin-top: 4px;
      display: block;
      text-align: left;
    }

    .typing-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      align-self: flex-start;
    }
    
    .typing-row.show { display: flex; }

    .typing-bubble {
      background: rgba(255,255,255,0.08);
      padding: 16px 20px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 8px; height: 8px;
      background: #25f4ee;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    
    .dot:nth-child(1) { animation-delay: -0.32s; background: #fe2c55; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .dot:nth-child(3) { animation-delay: 0; background: #fe2c55; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(15,15,15,0.98);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s;
    }
    
    .input-bar.hide { transform: translateY(100%); }

    .input-box {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 0.95em;
      outline: none;
    }
    
    .input-box input::placeholder { color: rgba(255,255,255,0.4); }

    .send-btn {
      width: 44px; height: 44px;
      background: #fe2c55;
      border: none;
      border-radius: 50%;
