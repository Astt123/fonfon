<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>رسالة إلك </title>
  <style>
    body {
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
    }
    .box {
      background: rgba(0,0,0,0.2);
      padding: 40px;
      border-radius: 20px;
    }
    h1 {
      font-size: 40px;
    }
    p {
      font-size: 20px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4f81;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>في شي بدي اقوله لك</h1>
    <p>من أول ما عرفتك... وأنتي غير 💫</p>
    <button onclick="showLove()">اضغطي هنا</button>
  </div>

  <script>
    function showLove() {
      document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;color:white;text-align:center;">
          <div>
            <h1>أنا بحبك ❤️</h1>
            <p>من زمان نفسي اقول بس مريد تخرب العلاقة الحالية</p>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
